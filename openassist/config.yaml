    together:
      api_key: tgp_v1_ghhLeGQ5_Q-9yxjIgghHtAjmnJHVZEpJYUNG3Dp2L7Y
      enabled: true
      model: meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo
      priority: 2
  strategy: priority
  use_complexity_routing: true
app:
  border_radius: 14
  font_size: 13
  gaze_fade:
    enabled: true
    margin: 60
    target_opacity: 0.2
  language: en
  opacity: 0.94
  theme: midnight
capture:
  audio:
    buffer_seconds: 4
    correct_transcript: true
    correction_provider: groq
    enabled: true
    mode: system
    whisper_model: base
  screen:
    change_threshold: 0.15
    enabled: true
    interval_ms: 500
    quality: medium
    smart_crop: true
hotkeys:
  emergency_erase: ctrl+shift+e
  history_next: ctrl+]
  history_prev: ctrl+[
  mini_mode: ctrl+alt+n
  move_down: ctrl+shift+down
  move_left: ctrl+shift+left
  move_right: ctrl+shift+right
  move_up: ctrl+shift+up
  quick_answer: ctrl+enter
  scroll_down: ctrl+alt+down
  scroll_up: ctrl+alt+up
  stealth: ctrl+shift+z
  switch_mode: ctrl+shift+s
  toggle: ctrl+\
  toggle_audio: ctrl+shift+a
  toggle_click_through: ctrl+m
nexus:
  max_age_seconds: 60
  polling_interval_ms: 3000
onboarding:
  completed: true
performance:
  debounce_ms: 150
  max_history: 50
  parallel_processing: true
stealth:
  enabled: true
  protect_capture: true
  typing_delay_ms: 25
