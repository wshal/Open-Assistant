ai:
  default_provider: groq
  fast_refine: true
  providers:
    cerebras:
      api_key: csk-2vdjy3rhch56vxm94pnke2vrfyxf5vpt22nwjecp6xnchj9e
      enabled: true
      model: llama3.1-70b
      priority: 1
    gemini:
      api_key: AIzaSyAK8wzzI_Mf0jgeTOiZMuAjnSCyo7B_IrE
      enabled: true
      model: gemini-1.5-pro
      priority: 2
    groq:
      api_key: ''
      enabled: false
      model: llama-3.1-70b-versatile
      priority: 1
    ollama:
      api_key: ''
      base_url: http://localhost:11434
      enabled: false
      model: llama3.1:8b
      priority: 3
    together:
      api_key: tgp_v1_ghhLeGQ5_Q-9yxjIgghHtAjmnJHVZEpJYUNG3Dp2L7Y
      enabled: true
      model: meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo
      priority: 2
  strategy: priority
app:
  border_radius: 14
  font_size: 13
  language: en
  opacity: 0.94
  theme: midnight
capture:
  audio:
    buffer_seconds: 4
    correct_transcript: true
    correction_provider: groq
    enabled: true
    mode: system
    whisper_model: base
  screen:
    change_threshold: 0.15
    enabled: true
    interval_ms: 500
    smart_crop: true
ghost_mode:
  auto_trigger: true
  enabled: true
  keywords:
  - help
  - what
  - fix
  - solve
  - define
  - compare
  - '?'
  sensitivity: 0.5
hotkeys:
  emergency_erase: ctrl+shift+e
  history_next: ctrl+]
  history_prev: ctrl+[
  mini_mode: ctrl+alt+n
  move_down: ctrl+down
  move_left: ctrl+left
  move_right: ctrl+right
  move_up: ctrl+up
  quick_answer: ctrl+enter
  scroll_down: ctrl+shift+down
  scroll_up: ctrl+shift+up
  stealth: ctrl+shift+z
  switch_mode: ctrl+shift+s
  toggle: ctrl+\
  toggle_audio: ctrl+shift+a
  toggle_click_through: ctrl+m
performance:
  debounce_ms: 150
  max_history: 50
  parallel_processing: true
stealth:
  enabled: true
  protect_capture: true
